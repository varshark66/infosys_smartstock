<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartStock - Reset Password</title>

<style>

/* ⭐ FIX FOR INPUT OVERFLOW */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#e0e7ff,#ffe6f0);
}

/* Card */
.card{
    background:white;
    padding:40px;
    width:380px;
    border-radius:14px;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:30px;
}

/* Input container */
.input-group{
    position:relative;
    width:100%;
    margin-bottom:18px;
}

/* Input field */
input{
    width:100%;
    padding:14px 45px 14px 14px;
    border-radius:10px;
    border:1.5px solid #ddd;
    font-size:15px;
    transition:0.2s;
}

input:focus{
    outline:none;
    border-color:#667eea;
}

/* Eye icon */
.eye{
    position:absolute;
    right:14px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    display:flex;
}

/* Button */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    margin-top:5px;
}

button:hover{
    opacity:0.9;
}

/* Messages */
.message{
    margin-top:15px;
    text-align:center;
    font-size:14px;
    display:none;
}

.success{ color:green; }
.error{ color:red; }

</style>
</head>

<body>

<div class="card">

<h2>Reset Your Password</h2>

<!-- New Password -->
<div class="input-group">
<input type="password" id="newPassword" placeholder="New Password">
<span class="eye" onclick="togglePassword('newPassword', this)">
<!-- Google style eye -->
<svg width="22" height="22" viewBox="0 0 24 24" fill="none">
<path d="M12 5C7 5 2.7 8.1 1 12C2.7 15.9 7 19 12 19C17 19 21.3 15.9 23 12C21.3 8.1 17 5 12 5Z" stroke="#777" stroke-width="2"/>
<circle cx="12" cy="12" r="3" stroke="#777" stroke-width="2"/>
</svg>
</span>
</div>

<!-- Confirm Password -->
<div class="input-group">
<input type="password" id="confirmPassword" placeholder="Confirm Password">
<span class="eye" onclick="togglePassword('confirmPassword', this)">
<svg width="22" height="22" viewBox="0 0 24 24" fill="none">
<path d="M12 5C7 5 2.7 8.1 1 12C2.7 15.9 7 19 12 19C17 19 21.3 15.9 23 12C21.3 8.1 17 5 12 5Z" stroke="#777" stroke-width="2"/>
<circle cx="12" cy="12" r="3" stroke="#777" stroke-width="2"/>
</svg>
</span>
</div>

<button onclick="resetPassword()">Update Password</button>

<div id="msg" class="message"></div>

</div>

<script>

/* Get token from URL */
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get("token");

/* Toggle password visibility */
function togglePassword(id, el){
    const input = document.getElementById(id);

    if(input.type==="password"){
        input.type="text";

        el.innerHTML=`
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M1 1L23 23" stroke="#777" stroke-width="2"/>
        <path d="M10.7 6.1C11.1 6 11.5 6 12 6C17 6 21.3 9.1 23 12C22.3 13.3 21.3 14.5 20.1 15.5M14.1 14.1C13.6 14.6 12.8 15 12 15C10.3 15 9 13.7 9 12C9 11.2 9.4 10.4 9.9 9.9" stroke="#777" stroke-width="2"/>
        </svg>`;
    }else{
        input.type="password";

        el.innerHTML=`
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12 5C7 5 2.7 8.1 1 12C2.7 15.9 7 19 12 19C17 19 21.3 15.9 23 12C21.3 8.1 17 5 12 5Z" stroke="#777" stroke-width="2"/>
        <circle cx="12" cy="12" r="3" stroke="#777" stroke-width="2"/>
        </svg>`;
    }
}

/* Show message */
function showMessage(text,type){
    const msg=document.getElementById("msg");
    msg.innerText=text;
    msg.className="message "+type;
    msg.style.display="block";
}


/* Reset password */
async function resetPassword(){

    const newPassword=document.getElementById("newPassword").value;
    const confirmPassword=document.getElementById("confirmPassword").value;

    if(!newPassword || !confirmPassword){
        showMessage("Please fill all fields","error");
        return;
    }

    if(newPassword!==confirmPassword){
        showMessage("Passwords do not match","error");
        return;
    }

    try{
        const response=await fetch("http://127.0.0.1:5000/reset-password",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({
                token:token,
                newpassword:newPassword
            })
        });

        const data=await response.json();

        if(response.ok){
            showMessage("✅ Password updated successfully. You can now login.","success");
            document.getElementById("newPassword").value="";
            document.getElementById("confirmPassword").value="";
        }else{
            showMessage(data.message || "Error occurred","error");
        }

    }catch(err){
        showMessage("Network error. Try again.","error");
    }
}

</script>

</body>
</html>
