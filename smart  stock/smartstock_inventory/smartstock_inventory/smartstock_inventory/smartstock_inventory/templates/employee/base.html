<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Inventory Management System - Employee{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/dashboard.css') }}" rel="stylesheet">
    <style>
        /* Employee-specific color overrides - exact same structure as admin */
        .top-header {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%) !important;
        }
        
        .sidebar {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%) !important;
        }
        
        /* Employee User Info Section - White text for dark background */
        .user-info-section {
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
        }
        
        .user-name {
            color: white !important;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3) !important;
        }
        
        .user-email {
            color: rgba(255, 255, 255, 0.8) !important;
        }
        
        /* Update nav items for dark sidebar */
        .nav-item {
            color: rgba(255, 255, 255, 0.9) !important;
        }
        
        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        
        .nav-item.active {
            background-color: #d4edda !important;
            color: #155724 !important;
            border-left-color: #28a745 !important;
        }
        
        .page-header h1 {
            color: #28a745 !important;
        }
        
        .stat-icon.blue {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%) !important;
        }
        
        .stat-icon.green {
            background: linear-gradient(135deg, #20c997 0%, #17a2b8 100%) !important;
        }
        
        .stat-icon.orange {
            background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%) !important;
        }
        
        .stat-icon.purple {
            background: linear-gradient(135deg, #6f42c1 0%, #e83e8c 100%) !important;
        }
        
        .btn-primary {
            background: #28a745 !important;
            border-color: #28a745 !important;
        }
        
        .btn-primary:hover {
            background: #218838 !important;
            border-color: #1e7e34 !important;
        }
        
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .status-badge.in-stock {
            background: #d4edda;
            color: #155724;
        }
        
        .status-badge.low-stock {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-badge.out-stock {
            background: #f8d7da;
            color: #721c24;
        }
        
        .search-filter-section {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 1.5rem;
        }
        
        .search-bar {
            margin-bottom: 1rem;
        }
        
        .filter-bar {
            display: flex;
            gap: 1rem;
            align-items: end;
        }
        
        .filter-bar .form-select {
            min-width: 200px;
        }
        
        .table-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        
        .table {
            margin-bottom: 0;
        }
        
        .table th {
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
            font-weight: 600;
            color: #495057;
        }
        
        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }
        
        .action-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        
        .action-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            color: inherit;
            text-decoration: none;
        }
        
        .action-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        
        .action-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .action-card p {
            color: #666;
            font-size: 0.9rem;
            margin: 0;
        }
        
        .recent-alerts {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        
        .recent-alerts h2 {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 1.5rem;
        }
        
        .alert-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .alert-item {
            display: flex;
            align-items: start;
            gap: 1rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #28a745;
        }
        
        .alert-item.warning {
            border-left-color: #ffc107;
        }
        
        .alert-item.info {
            border-left-color: #17a2b8;
        }
        
        .alert-item.success {
            border-left-color: #28a745;
        }
        
        .alert-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
        }
        
        .alert-content h4 {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.25rem;
        }
        
        .alert-content p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.25rem;
        }
        
        .alert-content small {
            font-size: 0.8rem;
            color: #999;
        }
        
        .quick-actions {
            margin-bottom: 2rem;
        }
        
        .quick-actions h2 {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="top-header">
            <div class="header-left">
                <i class="fas fa-bars menu-toggle"></i>
                <div class="logo">
                    <i class="fas fa-warehouse"></i>
                    <span>Smart Inventory - Employee</span>
                </div>
            </div>
            <div class="header-right">
                <div class="digital-clock" id="digitalClock">
                    <div class="clock-time" id="clockTime">00:00:00 PM</div>
                    <div class="clock-date" id="clockDate">Loading...</div>
                </div>
                <div class="notification-icon">
                    <i class="fas fa-bell"></i>
                    <span class="badge">3</span>
                </div>
                <div class="user-dropdown">
                    <i class="fas fa-user-circle"></i>
                    <span id="headerUserName">Employee</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <div class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <!-- User Information Section -->
                <div class="user-info-section">
                    <div class="user-details">
                        <h4 class="user-name" id="sidebarUserName">Guest User</h4>
                        <p class="user-email" id="sidebarUserEmail">guest@smartstock.com</p>
                    </div>
                </div>
                
                <nav class="sidebar-nav">
                    <a href="/employee-dashboard" class="nav-item {% if request.endpoint == 'employee_dashboard' %}active{% endif %}">
                        <i class="fas fa-tachometer-alt"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="/employee/products-view" class="nav-item {% if request.endpoint == 'employee_products_view' %}active{% endif %}">
                        <i class="fas fa-box"></i>
                        <span>Products</span>
                    </a>
                    <a href="/employee/stock-update" class="nav-item {% if request.endpoint == 'employee_stock_update' %}active{% endif %}">
                        <i class="fas fa-plus-circle"></i>
                        <span>Stock Update</span>
                    </a>
                    <a href="/employee/sales-entry" class="nav-item {% if request.endpoint == 'employee_sales_entry' %}active{% endif %}">
                        <i class="fas fa-shopping-cart"></i>
                        <span>Sales Entry</span>
                    </a>
                    <a href="/employee/alerts-view" class="nav-item {% if request.endpoint == 'employee_alerts_view' %}active{% endif %}">
                        <i class="fas fa-bell"></i>
                        <span>Alerts</span>
                    </a>
                    <a href="/employee/transaction-history" class="nav-item {% if request.endpoint == 'employee_transaction_history' %}active{% endif %}">
                        <i class="fas fa-history"></i>
                        <span>Transaction History</span>
                    </a>
                    <a href="/employee-profile" class="nav-item {% if request.endpoint == 'employee_profile' %}active{% endif %}">
                        <i class="fas fa-user"></i>
                        <span>Profile</span>
                    </a>
                </nav>
            </aside>

            <!-- Main Content -->
            <main class="page-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    <script>
        // Make logout function globally accessible
        function logout() {
            showLogoutDialog();
        }
        
        // Perform actual logout
        function performLogout() {
            console.log('Performing logout...');
            const btn = document.getElementById('confirmLogoutBtn');
            if (btn) {
                btn.innerHTML = 'Logging out...';
                btn.disabled = true;
            }
            
            setTimeout(() => {
                console.log('Redirecting to login...');
                localStorage.clear();
                window.location.href = '/login';
            }, 1000);
        }
        
        // Simple, clean, professional logout dialog
        function showLogoutDialog() {
            // Create light dark blur overlay
            const overlay = document.createElement('div');
            overlay.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.4);
                backdrop-filter: blur(4px);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 10000;
                animation: fadeIn 0.3s ease-out;
            `;

            // Create medium size dialog box
            const dialog = document.createElement('div');
            dialog.style.cssText = `
                background: white;
                border-radius: 12px;
                padding: 32px;
                width: 480px;
                max-width: 90vw;
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
                text-align: center;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                animation: slideUp 0.4s ease-out;
            `;

            dialog.innerHTML = `
                <!-- Warning Icon -->
                <div style="
                    width: 48px;
                    height: 48px;
                    margin: 0 auto 20px;
                    background: linear-gradient(135deg, #ff6b6b, #dc3545);
                    border-radius: 50%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
                ">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style="color: white;">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M16 17l5-5-5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>

                <!-- Title -->
                <h3 style="
                    color: #1a202c;
                    margin: 0 0 12px 0;
                    font-size: 20px;
                    font-weight: 600;
                    line-height: 1.4;
                ">Confirm Logout</h3>

                <!-- Message -->
                <p style="
                    color: #4a5568;
                    margin: 0 0 28px 0;
                    font-size: 16px;
                    line-height: 1.5;
                ">Are you sure you want to log out of the system?</p>

                <!-- Buttons -->
                <div style="
                    display: flex;
                    gap: 12px;
                    justify-content: center;
                ">
                    <button id="cancelBtn" style="
                        padding: 14px 32px;
                        border: 2px solid #e2e8f0;
                        background: white;
                        color: #6c757d;
                        border-radius: 8px;
                        font-size: 16px;
                        font-weight: 500;
                        cursor: pointer;
                        transition: all 0.3s ease;
                        min-width: 100px;
                        outline: none;
                    ">Cancel</button>

                    <button id="confirmLogoutBtn" onclick="console.log('Direct click!'); performLogout();" style="
                        padding: 14px 32px;
                        border: none;
                        background: linear-gradient(135deg, #dc3545, #c82333);
                        color: white;
                        border-radius: 8px;
                        font-size: 16px;
                        font-weight: 500;
                        cursor: pointer;
                        transition: all 0.3s ease;
                        min-width: 100px;
                        box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
                        outline: none;
                    ">Logout</button>
                </div>
            `;

            // Add smooth animations and hover effects
            const style = document.createElement('style');
            style.textContent = `
                @keyframes fadeIn {
                    from { opacity: 0; }
                    to { opacity: 1; }
                }
                
                @keyframes slideUp {
                    from { 
                        opacity: 0;
                        transform: translateY(20px) scale(0.95);
                    }
                    to { 
                        opacity: 1;
                        transform: translateY(0) scale(1);
                    }
                }
                
                #cancelBtn:hover {
                    background: #f8f9fa;
                    border-color: #dee2e6;
                    transform: translateY(-1px);
                }
                
                #logoutBtn:hover {
                    background: linear-gradient(135deg, #c82333, #a02622);
                    transform: translateY(-1px);
                    box-shadow: 0 6px 16px rgba(220, 53, 69, 0.4);
                }
                
                #cancelBtn:active, #logoutBtn:active {
                    transform: translateY(0);
                }
            `;
            document.head.appendChild(style);

            // Add to page
            overlay.appendChild(dialog);
            document.body.appendChild(overlay);

            // Button event handlers
            document.getElementById('cancelBtn').addEventListener('click', function() {
                console.log('Cancel button clicked');
                overlay.style.animation = 'fadeIn 0.3s ease-out reverse';
                setTimeout(() => {
                    document.body.removeChild(overlay);
                    document.head.removeChild(style);
                }, 300);
            });

            const confirmLogoutBtn = document.getElementById('confirmLogoutBtn');
            console.log('Confirm logout button found:', confirmLogoutBtn);
            
            if (confirmLogoutBtn) {
                confirmLogoutBtn.addEventListener('click', function() {
                    console.log('Confirm logout button clicked!');
                    // Add loading state
                    this.innerHTML = 'Logging out...';
                    this.disabled = true;
                    
                    setTimeout(() => {
                        console.log('Redirecting to login...');
                        localStorage.clear();
                        window.location.href = '/login';
                    }, 1000);
                });
            } else {
                console.error('Confirm logout button not found!');
            }

            // Close on overlay click
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) {
                    overlay.style.animation = 'fadeIn 0.3s ease-out reverse';
                    setTimeout(() => {
                        document.body.removeChild(overlay);
                        document.head.removeChild(style);
                    }, 300);
                }
            });

            // Close on Escape key
            const handleEscape = function(e) {
                if (e.key === 'Escape') {
                    overlay.style.animation = 'fadeIn 0.3s ease-out reverse';
                    setTimeout(() => {
                        document.body.removeChild(overlay);
                        document.head.removeChild(style);
                    }, 300);
                    document.removeEventListener('keydown', handleEscape);
                }
            };
            document.addEventListener('keydown', handleEscape);
        }
        
        // Wait for DOM to be fully loaded
        document.addEventListener('DOMContentLoaded', function() {
            // Load user data from sessionStorage
            loadUserData();
            
            // Start digital clock
            updateDigitalClock();
            setInterval(updateDigitalClock, 1000);
            
            // Toggle sidebar
            document.querySelector('.menu-toggle').addEventListener('click', function() {
                document.querySelector('.sidebar').classList.toggle('collapsed');
                document.querySelector('.page-content').classList.toggle('expanded');
            });
        });
        
        // Digital Clock Function
        function updateDigitalClock() {
            const now = new Date();
            
            // Format time in 12-hour format
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; // 0 should be 12
            const hoursStr = String(hours).padStart(2, '0');
            const timeString = `${hoursStr}:${minutes}:${seconds} ${ampm}`;
            
            // Format date without day
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            
            const monthName = months[now.getMonth()];
            const date = now.getDate();
            const year = now.getFullYear();
            
            const dateString = `${monthName} ${date}, ${year}`;
            
            // Update clock display
            const clockTime = document.getElementById('clockTime');
            const clockDate = document.getElementById('clockDate');
            
            if (clockTime) clockTime.textContent = timeString;
            if (clockDate) clockDate.textContent = dateString;
        }
        
        // Load User Data Function
        function loadUserData() {
            const userName = sessionStorage.getItem('user_name') || 'Guest User';
            const userEmail = sessionStorage.getItem('user_email') || 'guest@smartstock.com';
            
            // Update sidebar user info
            const sidebarUserName = document.getElementById('sidebarUserName');
            const sidebarUserEmail = document.getElementById('sidebarUserEmail');
            
            if (sidebarUserName) sidebarUserName.textContent = userName;
            if (sidebarUserEmail) sidebarUserEmail.textContent = userEmail;
            
            // Update header user info
            const headerUserName = document.getElementById('headerUserName');
            if (headerUserName) headerUserName.textContent = userName.split(' ')[0] || userName;
        }
    </script>
</body>
</html>
